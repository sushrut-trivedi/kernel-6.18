%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/qcom,wsa885x-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm WSA885X I2C smart speaker amplifier

maintainers:
  - Srinivas Kandagatla <srinivas.kandagatla@linaro.org>

allOf:
  - $ref: dai-common.yaml#

description: |
  WSA885X is a Qualcomm smart speaker amplifier codec.
  This binding describes the I2C control interface and
  board-level resources required by the codec.

properties:
  compatible:
    const: qcom,wsa885x-i2c

  reg:
    maxItems: 1

  '#sound-dai-cells':
    const: 0

  powerdown-gpios:
    description: GPIO spec for the codec shutdown/powerdown pin.
    maxItems: 1

  interrupt-gpios:
    description: GPIO spec for the codec interrupt pin.
    maxItems: 1

  vdd-io-supply:
    description: 1.8V I/O supply.

  vdd-1p8-supply:
    description: 1.8V analog/digital core supply.

  qcom,battery_config:
    description: Battery topology configuration.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [1, 2]

  wsa885x-init-table:
    description: Register/value initialization table as <reg val> pairs.
    $ref: /schemas/types.yaml#/definitions/uint32-array
    minItems: 2
    maxItems: 512

required:
  - compatible
  - reg
  - '#sound-dai-cells'
  - vdd-io-supply
  - vdd-1p8-supply
  - wsa885x-init-table

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>

    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        speaker-codec@c {
            compatible = "qcom,wsa885x-i2c";
            reg = <0x0c>;
            #sound-dai-cells = <0>;

            qcom,battery_config = <1>;

            powerdown-gpios = <&tlmm 12 GPIO_ACTIVE_LOW>;
            interrupt-gpios = <&tlmm 13 GPIO_ACTIVE_HIGH>;

            vdd-io-supply = <&vreg_l15a_1p8>;
            vdd-1p8-supply = <&vreg_l10a_1p8>;

            wsa885x-init-table = <
                0x800d 0x1c
                0x8090 0x1f
            >;
        };
    };

...
